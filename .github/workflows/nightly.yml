name: Nightly Build

on:
  push:
    branches: ["main"]
  schedule:
    # Runs every day at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package --file pom.xml

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Rename artifact with date
        run: |
          JAR=$(ls target/Core-*.jar | grep -v original)
          cp "$JAR" "target/Core-nightly-${{ steps.date.outputs.date }}.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Core-nightly-${{ steps.date.outputs.date }}
          path: target/Core-nightly-${{ steps.date.outputs.date }}.jar

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: nightly ${{ steps.date.outputs.date }}
          prerelease: true
          make_latest: false
          files: target/Core-nightly-${{ steps.date.outputs.date }}.jar
          body: |
            🌙 **Nightly build** — ${{ steps.date.outputs.date }}

            Built from commit: ${{ github.sha }}

            > This is an automated nightly build. It may be unstable.
            > Download the jar and place it in your server's `plugins/` folder.
